---
# Supervisor add-on manifest.
slug: pidp11
name: PiDP-11 Emulator
version: "1.1.0"
description: >
  SimH PDP-11 emulator from obsolescence/pidp11, with PiDP-11 front-panel
  GPIO driver and a persistent SSH console.
url: https://github.com/dmz006/pidp11-hacs
arch:
  - aarch64
startup: application
boot: auto
init: false
host_network: false
ports:
  "22/tcp": 2211
  "2223/tcp": 2223
  "2225/tcp": 2225
  "4000/tcp": 4000
ports_description:
  "22/tcp": SSH to PDP-11 console (screen)
  "2223/tcp": SimH remote console (HA integration only)
  "2225/tcp": SR watch stream — real-time switch register events (HA integration only)
  "4000/tcp": DZ11 terminal lines — telnet into running 211bsd OS
map:
  - share:rw
  - addon_config:rw
devices:
  - /dev/mem
privileged:
  - SYS_RAWIO
gpio: true
devicetree: true
hassio_api: true
hassio_role: default
image: ghcr.io/dmz006/pidp11-addon-{arch}
options:
  ssh_password: ""
  ssh_password_disabled: false
  ssh_authorized_keys: ""
  default_boot: "211bsd"
  enable_gpio: true
  remote_console_port: 2223
schema:
  ssh_password: password
  ssh_password_disabled: bool
  ssh_authorized_keys: str?
  default_boot: "list(211bsd|idled|blinky|dos11|rt11|rsts7|unix1|unix5|unix6|unix7|sysiii|sysv|rsx11mp|rsx11bq)"
  enable_gpio: bool
  remote_console_port: port
