set cpu 11/70, 4M
set noidle
set throttle 50%

; Ethernet disabled — requires host TAP interface (enable in S4 with network config)
;set xu enable
;set xu mac=aa:00:04:00:1e:78
;attach xu eth0

set tm disable
set hk disable
set rp disable

set rq0 autosize
; disks pre-staged via /share/pidp11/disks/rsx11mp/
attach rq0 /share/pidp11/disks/rsx11mp/PiDP11_DU0.dsk
set rq1 autosize
attach rq1 /share/pidp11/disks/rsx11mp/PiDP11_DU1.dsk
set rq2 autosize
set rq3 autosize

set tq tu81

set dz enable
set dz lines=8
set dz address=17760030
set dz vec=330
attach dz 10001

; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connected
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote connections=4
set remote telnet=2224

echo RSX-11M/P — disks must be pre-staged at /share/pidp11/disks/rsx11mp/
echo DZ11 terminal lines on port 10001

boot rq0
