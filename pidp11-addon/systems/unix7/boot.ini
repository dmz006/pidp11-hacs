detach all
reset all

set cpu 11/70 1M
set cpu idle
set rp0 rp06
; disk pre-staged via /share/pidp11/disks/unix7/
att rp0 /share/pidp11/disks/unix7/disk0.hp
set dci en
set dci lines=8
;att tm0 /share/pidp11/disks/unix7/dist.tap
;b tm0

; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connect
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote telnet=2224
set remote connections=4

echo
echo Type 'boot' (there is no prompt)
echo Then, 'hp(0,0)unix'
echo UNIX will boot into single-user mode. Log out (ctrl-d) to go multi-user.
echo To shutdown, type 'sync' three times and halt the emulation.
echo Disk image must be pre-staged at /share/pidp11/disks/unix7/disk0.hp

b rp0
