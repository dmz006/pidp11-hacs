detach all
reset all

; RSTS/E V7 — runs from 2 RL disk drives
set cpu 11/70 1024K fpp
set throttle 1M

set rl0 rl01
set rl1 rl01
attach rl0 rsts_full_rl.dsk
attach rl1 rsts_swap_rl.dsk

; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connected
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote telnet=2224
set remote connections=4

echo
echo To boot from the "Option: " prompt, hit <line-feed> (^J), enter
echo the date and time, and hit <return> at INIT's command file name prompt.
echo When output stops you can login to [1,2] using "HELLO 1,2" / password "SYSTEM".
echo To shutdown: "RUN $SHUTUP" as [1,2].

boot rl0
