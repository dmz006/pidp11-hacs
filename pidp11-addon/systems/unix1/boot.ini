detach all
reset all
set cpu 11/20
set cpu 32K
set rk0 enabled
att rk0 rk0.dsk
set rf 2p
set rf enabled
att rf rf0.dsk
set tc enabled
att tc tape
set hk disabled
set rha disabled
set tm disabled
set rx disabled
set rl disabled
set tq disabled
set tc enabled
set rf enabled
set ke enabled
set cpu history=1000
set dci en
set dci lines=8
set dco 7b
att dci 5555
load m792low.load

; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connect
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote connections=4
set remote telnet=2224
echo
echo use 'root' for login
echo see github.com/jserv/unix-v1 for documentation
echo there is no shutdown or sync in unix-v1, just reboot the PDP-11
echo

d system sr 173700
go 73700
