set cpu 11/70
set cpu 4096
set noidle
set throttle 50%

; Ethernet disabled — requires host TAP interface (enable in S4 with network config)
;set xu enable
;set xu type=delua
;set xu mac=aa:00:04:00:ea:04
;att xu en0

set tm disable
set hk disable
set rp disable

set rq0 rauser=1024
; disks pre-staged via /share/pidp11/disks/rsx11bq/
att rq0 /share/pidp11/disks/rsx11bq/pidp.dsk
set rq1 autosize
set rq2 autosize
set rq3 autosize

set tq0 write
att -f tq0 e11 /share/pidp11/disks/rsx11bq/pidp.tap

set clk 50

set dz enable
set dz lines=8
attach dz 10001

; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connected
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote connections=4
set remote telnet=2224

echo RSX-11M/P (BQTCP) — disks must be pre-staged at /share/pidp11/disks/rsx11bq/
echo DZ11 terminal lines on port 10001
echo Type 'boot rq0' to boot from disk, or 'boot tq0' from tape

boot rq0
