; model a PDP-11/70 with maximum memory, fpu, no CIS
set cpu 11/70 4096K fpp
; disable all extra devices by default, will enable later
detach all
reset all
; use 7b ascii terminal
set tto 7b
; set the boot disk as an MSCP UDA50
set rq enabled
set rq0 rauser=1000
attach rq0 /share/pidp11/disks/211bsd/2.11BSD_rq.dsk
; set one DZ11 8 line async mux
; accessible via telnet to 127.0.0.1:4000...4007
set dz enabled
set dz lines=8
set dz 7b
;attach -am dz 4000
attach dz 4000
;
sho dz
; Ethernet (DELUA/DEUNA) — disabled for S1 container; enable in S4 with tap interface
;set xq dis
;set xu enabled
;set xu type=delua
;attach xu eth0
; enable RX211 controller
;set ry enabled
;set ry0 double
;set ry1 double
;attach ry0 rx0.dsk
;attach ry1 rx1.dsk
; enable 11/44 TU-58 port
;set dli enabled
;set dlo enabled
;set dli lines=1
;set dlo 8b
;set dlo dataset
;attach dli 4010
; enable one tape device on a TMSCP controller
set tq enabled
; show our config
;show devices
;show cpu iospace
; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connected
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote connections=4
set remote telnet=2224
; Configure all csr/vector
set cpu autoconfig
; Change DZ vector
set dz vector=310
; boot it
;set throttle 40M
boot rq0
