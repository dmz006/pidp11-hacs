set cpu 11/70
set cpu idle
set rp0 rp06
; disk pre-staged via /share/pidp11/disks/sysv/
att rp0 /share/pidp11/disks/sysv/disk.hp

; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connect
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote telnet=2224
set remote connections=4

echo
echo Boot with '#0=unix' (# and = are printed by the boot loader)
echo Once in single-user mode, type 'init 2' to go to multi-user.
echo To shutdown, type 'sync' three times and halt the emulation.
echo Disk must be pre-staged at /share/pidp11/disks/sysv/disk.hp

b rp0
