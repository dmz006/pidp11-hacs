set cpu 11/70, 4M
set nothrottle
set noidle

set dli enable
set dli line=2
SET RL0 RL02
ATT RL0 rt11V.dsk
set rl1 rl02
att rl1 DEC-11-Graphics.dsk

; VT11 vector display not available in headless build
;set vt crt=vr14
;set vt scale=2
;set vt enable

; realcons (GPIO panel) enabled in S4 — disabled here for container-only operation
;set realcons host=localhost
;set realcons panel=11/70
;set realcons interval=1
;set realcons connected
; Remote console for HA integration (authshim proxies :2223 → :2224)
set remote telnet=2224
set remote connections=4

boot rl0
