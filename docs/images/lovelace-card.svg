<?xml version="1.0" encoding="UTF-8"?>
<!-- PiDP-11 Lovelace card mockup
     PC = 001234 octal (0b0000 0010 1001 1100)
     PSW = 000340 octal (0b0000 0000 1110 0000)
     System: 2.11BSD, CPU: RUNNING
-->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="200" viewBox="0 0 380 200">

  <!-- Card shadow/base -->
  <rect width="380" height="200" rx="10" ry="10" fill="#111114"/>

  <!-- Faceplate (top section with gradient approx as flat color) -->
  <path d="M10,0 L370,0 Q380,0 380,10 L380,155 L0,155 L0,10 Q0,0 10,0 Z" fill="#1b1b1f"/>

  <!-- Bottom bar -->
  <path d="M0,155 L380,155 L380,190 Q380,200 370,200 L10,200 Q0,200 0,190 Z" fill="#0e0e11"/>

  <!-- Faceplate / bar divider line -->
  <line x1="0" y1="155" x2="380" y2="155" stroke="#0a0a0d" stroke-width="1"/>

  <!-- ── Brand ── -->
  <text x="18" y="36" fill="#c0c0c8"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="bold" letter-spacing="4">PDP-11/70</text>
  <text x="18" y="50" fill="#3a3a44"
        font-family="'Courier New', Courier, monospace"
        font-size="8" letter-spacing="2">SIMH · PIDP-11 · HOME ASSISTANT</text>

  <!-- ── RUN lamp (lit amber) ── -->
  <circle cx="354" cy="29" r="8" fill="#ff8c00"/>
  <!-- highlight -->
  <circle cx="351" cy="26" r="3" fill="#ffd080" opacity="0.7"/>
  <text x="354" y="46" fill="#7a4a10"
        font-family="'Courier New', Courier, monospace"
        font-size="8" letter-spacing="2" text-anchor="middle">RUN</text>

  <!-- ── ADDRESS row ── -->
  <text x="18" y="72" fill="#383840"
        font-family="'Courier New', Courier, monospace"
        font-size="8" letter-spacing="2">ADDRESS REGISTER (PC)</text>
  <text x="362" y="72" fill="#7a5020"
        font-family="'Courier New', Courier, monospace"
        font-size="11" text-anchor="end">1234</text>

  <!-- PC = 001234 octal → 0000 0010 1001 1100 binary -->
  <!-- Group 1 (bits 15-12): 0 0 0 0 — all off -->
  <circle cx="23"  cy="86" r="5" fill="#1a0a00"/>
  <circle cx="36"  cy="86" r="5" fill="#1a0a00"/>
  <circle cx="49"  cy="86" r="5" fill="#1a0a00"/>
  <circle cx="62"  cy="86" r="5" fill="#1a0a00"/>
  <!-- Group 2 (bits 11-8): 0 0 1 0 — index 2 on -->
  <circle cx="85"  cy="86" r="5" fill="#1a0a00"/>
  <circle cx="98"  cy="86" r="5" fill="#1a0a00"/>
  <circle cx="111" cy="86" r="5" fill="#ff8c00"/>
  <circle cx="124" cy="86" r="5" fill="#1a0a00"/>
  <!-- Group 3 (bits 7-4): 1 0 0 1 — indices 0 and 3 on -->
  <circle cx="147" cy="86" r="5" fill="#ff8c00"/>
  <circle cx="160" cy="86" r="5" fill="#1a0a00"/>
  <circle cx="173" cy="86" r="5" fill="#1a0a00"/>
  <circle cx="186" cy="86" r="5" fill="#ff8c00"/>
  <!-- Group 4 (bits 3-0): 1 1 0 0 — indices 0 and 1 on -->
  <circle cx="209" cy="86" r="5" fill="#ff8c00"/>
  <circle cx="222" cy="86" r="5" fill="#ff8c00"/>
  <circle cx="235" cy="86" r="5" fill="#1a0a00"/>
  <circle cx="248" cy="86" r="5" fill="#1a0a00"/>

  <!-- ── DATA row ── -->
  <text x="18" y="112" fill="#383840"
        font-family="'Courier New', Courier, monospace"
        font-size="8" letter-spacing="2">DATA REGISTER (PSW)</text>
  <text x="362" y="112" fill="#7a5020"
        font-family="'Courier New', Courier, monospace"
        font-size="11" text-anchor="end">340</text>

  <!-- PSW = 000340 octal → 0000 0000 1110 0000 binary -->
  <!-- Group 1 (bits 15-12): 0 0 0 0 -->
  <circle cx="23"  cy="126" r="5" fill="#1a0a00"/>
  <circle cx="36"  cy="126" r="5" fill="#1a0a00"/>
  <circle cx="49"  cy="126" r="5" fill="#1a0a00"/>
  <circle cx="62"  cy="126" r="5" fill="#1a0a00"/>
  <!-- Group 2 (bits 11-8): 0 0 0 0 -->
  <circle cx="85"  cy="126" r="5" fill="#1a0a00"/>
  <circle cx="98"  cy="126" r="5" fill="#1a0a00"/>
  <circle cx="111" cy="126" r="5" fill="#1a0a00"/>
  <circle cx="124" cy="126" r="5" fill="#1a0a00"/>
  <!-- Group 3 (bits 7-4): 1 1 1 0 — first 3 on -->
  <circle cx="147" cy="126" r="5" fill="#ff8c00"/>
  <circle cx="160" cy="126" r="5" fill="#ff8c00"/>
  <circle cx="173" cy="126" r="5" fill="#ff8c00"/>
  <circle cx="186" cy="126" r="5" fill="#1a0a00"/>
  <!-- Group 4 (bits 3-0): 0 0 0 0 -->
  <circle cx="209" cy="126" r="5" fill="#1a0a00"/>
  <circle cx="222" cy="126" r="5" fill="#1a0a00"/>
  <circle cx="235" cy="126" r="5" fill="#1a0a00"/>
  <circle cx="248" cy="126" r="5" fill="#1a0a00"/>

  <!-- ── Bottom bar content ── -->
  <text x="18" y="172" fill="#2e2e36"
        font-family="'Courier New', Courier, monospace"
        font-size="8" letter-spacing="2">SYSTEM</text>
  <text x="18" y="189" fill="#ff8c00"
        font-family="'Courier New', Courier, monospace"
        font-size="14" letter-spacing="1">2.11BSD</text>

  <!-- Status indicators -->
  <circle cx="300" cy="169" r="4" fill="#ff8c00"/>
  <text x="300" y="186" fill="#2a2a30"
        font-family="'Courier New', Courier, monospace"
        font-size="7" text-anchor="middle" letter-spacing="1">PROC</text>

  <circle cx="322" cy="169" r="4" fill="#190b00"/>
  <text x="322" y="186" fill="#2a2a30"
        font-family="'Courier New', Courier, monospace"
        font-size="7" text-anchor="middle" letter-spacing="1">BUS</text>

  <circle cx="343" cy="169" r="4" fill="#190b00"/>
  <text x="343" y="186" fill="#2a2a30"
        font-family="'Courier New', Courier, monospace"
        font-size="7" text-anchor="middle">PAR</text>

  <circle cx="363" cy="169" r="4" fill="#190b00"/>
  <text x="363" y="186" fill="#2a2a30"
        font-family="'Courier New', Courier, monospace"
        font-size="7" text-anchor="middle">ERR</text>

</svg>
